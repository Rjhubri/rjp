<!DOCTYPE html>
<html>
<head>
<title>Live Location Share</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

h2{
padding:10px;
}

#map{
width:100%;
height:60vh;
border:none;
}

.buttons{
margin-top:20px;
}

button{
width:90%;
max-width:300px;
padding:12px;
margin:10px;
font-size:16px;
border:none;
border-radius:6px;
background:#2196F3;
color:white;
}

button:hover{
background:#1976D2;
}

</style>

</head>

<body>

<h2>Live Location</h2>

<div id="map"></div>

<div class="buttons">

<button onclick="shareWhatsApp()">Share on WhatsApp</button>

<button onclick="copyLink()">Copy Location Link</button>

</div>

<script>

let lat = "";
let lon = "";

window.onload = function(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

lat = position.coords.latitude;
lon = position.coords.longitude;

document.getElementById("map").innerHTML =
'<iframe width="100%" height="100%" src="https://maps.google.com/maps?q='+lat+','+lon+'&z=15&output=embed"></iframe>';

});

}else{
alert("Location not supported");
}

}

function shareWhatsApp(){

let link = "https://maps.google.com/?q="+lat+","+lon;

let url = "https://wa.me/?text=My Live Location: "+link;

window.open(url);

}

function copyLink(){

let link = "https://maps.google.com/?q="+lat+","+lon;

navigator.clipboard.writeText(link);

alert("Location link copied");

}

</script>

</body>
</html>
