<!DOCTYPE html>
<html>
<head>
<title>Live Location Share</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

#map{
height:400px;
width:100%;
margin-top:20px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
background:#2196F3;
color:white;
border-radius:5px;
}

button:hover{
background:#0b7dda;
}

</style>

</head>

<body>

<h2>Share Your Live Location</h2>

<div id="map"></div>

<br>

<button onclick="getLocation()">Get Live Location</button>

<button onclick="shareWhatsApp()">Share on WhatsApp</button>

<button onclick="copyLink()">Copy Location Link</button>

<script>

let lat = "";
let lon = "";

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

lat = position.coords.latitude;
lon = position.coords.longitude;

let mapUrl = "https://maps.google.com/?q="+lat+","+lon;

document.getElementById("map").innerHTML =
'<iframe width="100%" height="400" src="https://maps.google.com/maps?q='+lat+','+lon+'&z=15&output=embed"></iframe>';

});

}else{
alert("Geolocation not supported");
}

}

function shareWhatsApp(){

let link = "https://maps.google.com/?q="+lat+","+lon;

let url = "https://wa.me/?text=My Live Location: "+link;

window.open(url);

}

function copyLink(){

let link = "https://maps.google.com/?q="+lat+","+lon;

navigator.clipboard.writeText(link);

alert("Location link copied");

}

</script>

</body>
</html>
