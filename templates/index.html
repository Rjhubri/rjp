<!DOCTYPE html>
<html>
<head>

<title>Checking Location</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f2f4f8;
font-family:Arial, sans-serif;
}

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
text-align:center;
width:90%;
max-width:350px;
}

h2{
margin-bottom:25px;
color:#333;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#43a047;
}

</style>

</head>

<body>

<div class="container">

<h2>Checking Location Permission</h2>

<button onclick="checkLocation()">Allow Location</button>

</div>

<script>

function checkLocation(){

if(!navigator.geolocation){
alert("Location not supported");
return;
}

navigator.geolocation.getCurrentPosition(

function(position){
window.location.href="/home";
},

function(){
alert("Please allow location permission");
}

);

}

window.onload=checkLocation;

</script>

</body>
</html>
