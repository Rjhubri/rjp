<!DOCTYPE html>
<html>
<head>

<title>Live Location</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
}

#map{
width:100%;
height:70vh;
}

#loading{
font-size:18px;
margin-top:20px;
color:#444;
}

button{
padding:12px;
margin:10px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Your Live Location</h2>

<div id="loading">Please wait, map is loading...</div>

<div id="map"></div>

<button onclick="share()">Share WhatsApp</button>
<button onclick="copy()">Copy Location</button>

<script>

let lat="";
let lon="";

navigator.geolocation.getCurrentPosition(function(pos){

lat=pos.coords.latitude;
lon=pos.coords.longitude;

let iframe=document.createElement("iframe");

iframe.width="100%";
iframe.height="100%";
iframe.src="https://maps.google.com/maps?q="+lat+","+lon+"&z=15&output=embed";

iframe.onload=function(){

document.getElementById("loading").style.display="none";

};

document.getElementById("map").appendChild(iframe);

});

function share(){

let link="https://maps.google.com/?q="+lat+","+lon;

window.open("https://wa.me/?text="+link);

}

function copy(){

let link="https://maps.google.com/?q="+lat+","+lon;

navigator.clipboard.writeText(link);

alert("Location copied");

}

</script>

</body>
</html>
