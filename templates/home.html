<!DOCTYPE html>
<html>
<head>

<title>Live Location</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f6fa;
text-align:center;
}

.header{
background:#4CAF50;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

#loading{
margin-top:20px;
font-size:16px;
color:#555;
}

#map{
width:95%;
height:65vh;
margin:20px auto;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.buttons{
margin-top:10px;
}

button{
padding:12px 18px;
margin:10px;
font-size:15px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.share{
background:#25D366;
color:white;
}

.copy{
background:#3498db;
color:white;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="header">
Your Live Location
</div>

<div id="loading">Please wait, map is loading...</div>

<div id="map"></div>

<div class="buttons">
<button class="share" onclick="share()">Share WhatsApp</button>
<button class="copy" onclick="copy()">Copy Location</button>
</div>

<script>

let lat="";
let lon="";

navigator.geolocation.getCurrentPosition(function(pos){

lat=pos.coords.latitude;
lon=pos.coords.longitude;

let iframe=document.createElement("iframe");

iframe.width="100%";
iframe.height="100%";
iframe.src="https://maps.google.com/maps?q="+lat+","+lon+"&z=15&output=embed";

iframe.onload=function(){
document.getElementById("loading").style.display="none";
};

document.getElementById("map").appendChild(iframe);

});

function share(){

let link="https://maps.google.com/?q="+lat+","+lon;

window.open("https://wa.me/?text="+link);

}

function copy(){

let link="https://maps.google.com/?q="+lat+","+lon;

navigator.clipboard.writeText(link);

alert("Location copied");

}

</script>

</body>
</html>
