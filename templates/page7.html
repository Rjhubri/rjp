<!DOCTYPE html>
<html>
<head>
<title>Home Page</title>

<style>

html, body {height:100%;margin:0;font-family:Arial;}

.left {float:left;width:24%;height:100%;background:#f2f2f2;}

.left-top {width:100%;height:35%;background:#ddd;padding:10px;box-sizing:border-box;}

.center {float:left;width:49%;height:100%;text-align:center;padding-top:40px;}

.right {float:left;width:24%;height:100%;background:#f9f9f9;padding:20px;}

.not-active {color:red;font-weight:bold;}

.active-company {color:blue;font-weight:bold;}

.right a {display:block;margin-bottom:10px;text-decoration:none;color:black;}

input,select{width:95%;padding:5px;margin-top:5px;}

button{margin-top:5px;padding:5px 10px;}

</style>
</head>

<body>

<div class="left">

<div class="left-top">

<h3>Company Path</h3>

<form method="POST" action="/set_path">

<input type="text" name="company_path" value="{{company_path}}">

<button type="submit">Set Path</button>

</form>

<hr>

{% if active_company %}

<p class="active-company">

Active Company : {{active_company}}

</p>

{% else %}

<p class="not-active">

Company Not Active

</p>

{% endif %}

<form method="POST" action="/activate_company">

<select name="company_name">

<option>Select Company</option>

{% for company in companies %}

<option value="{{company}}">

{{company}}

</option>

{% endfor %}

</select>

<br>

<button type="submit">

Activate Company

</button>

</form>

</div>

</div>


<div class="center">

<h1>

Welcome to RE2 Project

</h1>

</div>


<div class="right">

<h3>Pages</h3>

<a href="/page1">Company Page</a>
<a href="/page2">Page 2</a>
<a href="/page3">Page 3</a>
<a href="/page4">Page 4</a>
<a href="/page5">Page 5</a>

</div>

</body>
</html>
